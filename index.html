<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>VALAK SEARCH</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      background: #080810;
      color: #e0e0e0;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    canvas#particles {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 20px 60px;
      min-height: 100vh;
    }

    /* ── Logo ── */
    .logo {
      text-align: center;
      margin-bottom: 44px;
    }

    .logo h1 {
      font-family: 'Cinzel Decorative', serif;
      font-size: 46px;
      font-weight: 700;
      color: #ffffff;
      text-shadow: 0 0 30px rgba(160,160,255,0.25);
      letter-spacing: 5px;
      line-height: 1;
    }

    .logo .sub {
      font-family: 'Cinzel', serif;
      font-size: 12px;
      font-weight: 400;
      color: rgba(255,255,255,0.35);
      letter-spacing: 9px;
      display: block;
      margin-top: 8px;
    }

    /* ── Botão inicial ── */
    .btn-reveal {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.7);
      padding: 13px 36px;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 400;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 9px;
      transition: background 0.2s, transform 0.15s;
      letter-spacing: 0.2px;
      backdrop-filter: blur(6px);
    }

    .btn-reveal:active { transform: scale(0.97); background: rgba(255,255,255,0.08); }

    /* ── Área de resultados ── */
    .results {
      width: 100%;
      max-width: 440px;
      margin-top: 28px;
      display: none;
      flex-direction: column;
      gap: 12px;
      animation: fadeUp 0.35s ease;
    }

    .results.visible { display: flex; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Seção ── */
    .section {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
      overflow: hidden;
    }

    .section-title {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 2.5px;
      color: rgba(255,255,255,0.3);
      padding: 9px 14px 7px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      text-transform: uppercase;
    }

    /* ── Campo ── */
    .field {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      gap: 10px;
    }

    .field:last-child { border-bottom: none; }

    .field-content { flex: 1; min-width: 0; }

    .field-label {
      font-size: 9px;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
      letter-spacing: 0.9px;
      margin-bottom: 3px;
    }

    .field-value {
      font-size: 14px;
      color: rgba(255,255,255,0.88);
      word-break: break-word;
      white-space: pre-wrap;
      line-height: 1.55;
    }

    .field-value.empty {
      color: rgba(255,255,255,0.2);
      font-style: italic;
    }

    .btn-copy-field {
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.25);
      cursor: pointer;
      padding: 2px 3px;
      border-radius: 4px;
      font-size: 14px;
      flex-shrink: 0;
      transition: color 0.15s;
      line-height: 1;
      margin-top: 1px;
    }

    .btn-copy-field.ok { color: rgba(100, 210, 130, 0.9); }

    /* ── Copiar tudo ── */
    .btn-copy-all {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.14);
      color: rgba(255,255,255,0.75);
      padding: 14px 20px;
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      width: 100%;
      max-width: 440px;
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s;
      margin-top: 4px;
    }

    .btn-copy-all.visible { display: flex; }
    .btn-copy-all:active  { transform: scale(0.98); background: rgba(255,255,255,0.09); }
    .btn-copy-all.ok      { border-color: rgba(100,210,130,0.4); color: rgba(100,210,130,0.9); }

    /* ── Erro ── */
    .error-msg {
      color: rgba(255,100,100,0.85);
      font-size: 13px;
      text-align: center;
      margin-top: 20px;
      padding: 12px 20px;
      background: rgba(255,50,50,0.07);
      border: 1px solid rgba(255,50,50,0.18);
      border-radius: 8px;
      width: 100%;
      max-width: 440px;
    }
  </style>
</head>
<body>

<canvas id="particles"></canvas>

<div class="container">
  <div class="logo">
    <h1>VALAK</h1>
    <span class="sub">SEARCH</span>
  </div>

  <button class="btn-reveal" id="btn-reveal">&#128269; Ver Resultado</button>

  <div class="results" id="results"></div>

  <div id="error-box"></div>

  <button class="btn-copy-all" id="btn-copy-all">&#128203; Copiar Tudo</button>
</div>

<script>
// ── Telegram Web App init ─────────────────────────────────────
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

// ── Partículas ────────────────────────────────────────────────
(function () {
  const canvas = document.getElementById('particles');
  const ctx    = canvas.getContext('2d');
  let W, H, pts;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
    pts = Array.from({ length: Math.floor((W * H) / 13000) }, () => ({
      x:  Math.random() * W,
      y:  Math.random() * H,
      vx: (Math.random() - 0.5) * 0.28,
      vy: (Math.random() - 0.5) * 0.28,
      r:  Math.random() * 1.4 + 0.4,
    }));
  }

  function loop() {
    ctx.clearRect(0, 0, W, H);
    const max = 115;
    for (let i = 0; i < pts.length; i++) {
      const p = pts[i];
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0 || p.x > W) p.vx *= -1;
      if (p.y < 0 || p.y > H) p.vy *= -1;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(190,190,255,0.45)';
      ctx.fill();
      for (let j = i + 1; j < pts.length; j++) {
        const q   = pts[j];
        const dx  = p.x - q.x, dy = p.y - q.y;
        const d   = Math.sqrt(dx * dx + dy * dy);
        if (d < max) {
          ctx.beginPath();
          ctx.moveTo(p.x, p.y);
          ctx.lineTo(q.x, q.y);
          ctx.strokeStyle = `rgba(170,170,255,${0.11 * (1 - d / max)})`;
          ctx.lineWidth   = 0.5;
          ctx.stroke();
        }
      }
    }
    requestAnimationFrame(loop);
  }

  resize();
  loop();
  window.addEventListener('resize', resize);
})();

// ── Lógica ───────────────────────────────────────────────────
const params      = new URLSearchParams(window.location.search);
const cmd         = (params.get('cmd') || '').trim().toLowerCase();
const rawVals     = params.get('v') || '';
const btnReveal   = document.getElementById('btn-reveal');
const resultsDiv  = document.getElementById('results');
const errorBox    = document.getElementById('error-box');
const btnCopyAll  = document.getElementById('btn-copy-all');

let allData = [];

btnReveal.addEventListener('click', async () => {
  btnReveal.style.display = 'none';

  if (!cmd || !rawVals) {
    showError('Dados não encontrados na URL.');
    return;
  }

  try {
    const res = await fetch(`templates/${cmd}.json?t=${Date.now()}`);

    if (res.ok) {
      // Modo template: valores posicionais
      const template = await res.json();
      const values = rawVals.split('|').map(v =>
        decodeURIComponent(v.replace(/\+/g, ' ')).trim()
      );
      let idx = 0;
      allData = template.sections.map(sec => ({
        name:   sec.name,
        fields: sec.fields.map(label => ({
          label,
          value: values[idx++] ?? '',
        })).filter(f => f.value !== '' && f.value !== '—'),
      })).filter(sec => sec.fields.length > 0);

    } else {
      // Modo direto: pares label:valor na URL (sem template)
      const pairs = rawVals.split('|').map(pair => {
        const ci = pair.indexOf(':');
        if (ci < 1) return null;
        return {
          label: decodeURIComponent(pair.slice(0, ci)).trim(),
          value: decodeURIComponent(pair.slice(ci + 1).replace(/\+/g, ' ')).trim(),
        };
      }).filter(p => p && p.value);
      allData = [{ name: cmd.toUpperCase(), fields: pairs }];
    }

    render(allData);
    resultsDiv.classList.add('visible');
    btnCopyAll.classList.add('visible');

  } catch (err) {
    showError(err.message || 'Erro ao carregar o resultado.');
  }
});

function render(data) {
  resultsDiv.innerHTML = '';
  data.forEach(sec => {
    const secEl = document.createElement('div');
    secEl.className = 'section';

    const titleEl = document.createElement('div');
    titleEl.className = 'section-title';
    titleEl.textContent = sec.name;
    secEl.appendChild(titleEl);

    sec.fields.forEach(({ label, value }) => {
      const fieldEl = document.createElement('div');
      fieldEl.className = 'field';

      const content = document.createElement('div');
      content.className = 'field-content';

      const lbl = document.createElement('div');
      lbl.className = 'field-label';
      lbl.textContent = label;

      const val = document.createElement('div');
      val.className = 'field-value';
      val.textContent = value;

      content.appendChild(lbl);
      content.appendChild(val);

      const cpBtn = document.createElement('button');
      cpBtn.className = 'btn-copy-field';
      cpBtn.innerHTML = '&#128203;';
      cpBtn.addEventListener('click', () => {
        copy(value || '—', cpBtn, '&#10003;', '&#128203;');
      });

      fieldEl.appendChild(content);
      fieldEl.appendChild(cpBtn);
      secEl.appendChild(fieldEl);
    });

    resultsDiv.appendChild(secEl);
  });
}

btnCopyAll.addEventListener('click', () => {
  const lines = [];
  allData.forEach(sec => {
    lines.push(`━━━ ${sec.name} ━━━`);
    sec.fields.forEach(({ label, value }) => {
      lines.push(`${label}: ${value || '—'}`);
    });
    lines.push('');
  });
  const text = lines.join('\n').trim();
  copy(text, btnCopyAll, '&#10003; Copiado!', '&#128203; Copiar Tudo');
});

function copy(text, btn, successHtml, resetHtml) {
  navigator.clipboard.writeText(text).then(() => {
    if (!btn) return;
    btn.innerHTML = successHtml;
    btn.classList.add('ok');
    setTimeout(() => {
      btn.innerHTML = resetHtml;
      btn.classList.remove('ok');
    }, 1800);
  });
}

function showError(msg) {
  errorBox.innerHTML = `<div class="error-msg">&#9888;&#65039; ${msg}</div>`;
}
</script>
</body>
</html>
